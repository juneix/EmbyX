<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="color-scheme" content="dark light">
<title>EmbyX - 元数据管理器</title>
<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.tailwindcss.com" data-cfasync="false"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='lib/tailwind.min.js';s.setAttribute('data-cfasync','false');document.head.appendChild(s)"></script>
<script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='lib/lucide.min.js';document.head.appendChild(s)"></script>
<script data-cfasync="false">
tailwind.config={theme:{extend:{colors:{primary:'#52B54B',emby:{500:'#52B54B'},dark:{800:'#1f2937',900:'#111827',950:'#0a0e14'}}}}}
</script>
<style>
:root,[data-theme="light"]{--bg:#f3f4f6;--surface:#fff;--surface2:#f9fafb;--border:#e5e7eb;--text:#1f2937;--text2:#6b7280;--primary:#52B54B;--primary-bg:rgba(82,181,75,.12);--hover:rgba(0,0,0,.04);--selected:rgba(82,181,75,.15);--input-bg:#fff;--tree-line:#e5e7eb;--scrollbar:#d1d5db}
[data-theme="dark"]{--bg:#0a0e14;--surface:#151b24;--surface2:#1a2130;--border:#2a3340;--text:#e5e7eb;--text2:#9ca3af;--primary:#52B54B;--primary-bg:rgba(82,181,75,.18);--hover:rgba(255,255,255,.04);--selected:rgba(82,181,75,.2);--input-bg:#1a2130;--tree-line:#2a3340;--scrollbar:#374151}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s ease;position:relative;z-index:10;flex-shrink:0}
#sidebar.collapsed{width:56px}
#sidebar .logo{padding:16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);min-height:56px}
#sidebar .logo img{width:28px;height:28px;border-radius:7px;flex-shrink:0}
#sidebar .logo span{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;transition:opacity .2s}
#sidebar.collapsed .logo span{opacity:0;width:0}
#sidebar.collapsed .nav-label{display:none}
#sidebar.collapsed .nav-item{justify-content:center;padding:10px 0;font-size:.7rem;flex-direction:column;gap:3px}
#sidebar.collapsed .sidebar-toggle-text{display:none}
#sidebar.collapsed .nav-section{display:none}

.nav-list{flex:1;overflow-y:auto;padding:6px}
.nav-section{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);padding:14px 10px 4px;font-weight:600;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .12s;color:var(--text);opacity:.72;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--hover);opacity:1}
.nav-item.active{background:var(--primary-bg);color:var(--primary);font-weight:600;opacity:1}
.sidebar-toggle{display:flex;align-items:center;gap:6px;padding:12px 14px;cursor:pointer;border-top:1px solid var(--border);opacity:.45;transition:all .12s;font-size:.75rem;color:var(--text2)}
.sidebar-toggle:hover{opacity:1;background:var(--hover)}

#main{flex:1;display:flex;overflow:hidden}
#tree-panel{width:33.33%;min-width:260px;max-width:420px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface2)}
#tree-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;min-height:48px}
#tree-header h3{font-size:.85rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tree-search{width:100%;padding:6px 8px 6px 28px;border-radius:7px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:.78rem;outline:none;transition:border .2s}
#tree-search:focus{border-color:var(--primary)}
.tree-box{flex:1;overflow-y:auto;padding:3px 0}

.tn{display:flex;align-items:center;padding:4px 10px;cursor:pointer;font-size:.78rem;border-radius:6px;margin:1px 5px;transition:background .1s;gap:5px}
.tn:hover{background:var(--hover)}
.tn.sel{background:var(--selected);color:var(--primary);font-weight:500}
.tn .arr{width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;opacity:.45}
.tn .arr.open{transform:rotate(90deg)}
.tn .arr.hide{opacity:0;pointer-events:none}
.tn .ico{width:15px;height:15px;flex-shrink:0;opacity:.55}
.tn .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn .cnt{font-size:.65rem;color:var(--text2);flex-shrink:0;min-width:16px;text-align:right}
.tn .ck{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;cursor:pointer}
.tn .ck.on{background:var(--primary);border-color:var(--primary)}
.tn .ck.on::after{content:'';width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.tn .ck.part{background:var(--primary);border-color:var(--primary)}
.tn .ck.part::after{content:'';width:7px;height:0;border-bottom:1.5px solid #fff}
.tc{padding-left:14px;border-left:1px solid var(--tree-line);margin-left:17px}
.tc.shut{display:none}
.tl{padding:6px 10px;font-size:.72rem;color:var(--text2);display:flex;align-items:center;gap:5px}
.tl .sp{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#edit-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#edit-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:48px}
#edit-header h3{font-size:.85rem;font-weight:600;flex:1}
.edit-body{flex:1;overflow-y:auto;padding:18px}
.ep{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);gap:10px;font-size:.82rem}
.ep i{width:40px;height:40px;opacity:.25}

.fg{margin-bottom:14px}
.fl{font-size:.7rem;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:.82rem;outline:none;transition:border .2s,box-shadow .2s;font-family:inherit}
.fi:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(82,181,75,.15)}
textarea.fi{resize:vertical;min-height:72px}
.fh{font-size:.68rem;color:var(--text2);margin-top:3px;opacity:.65}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;font-size:.78rem;font-weight:500;cursor:pointer;border:none;transition:all .12s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{filter:brightness(1.1)}
.btn-s{background:var(--hover);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:rgba(128,128,128,.15)}
.btn-d{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.2)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

#batch-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 18px;display:none;align-items:center;gap:10px;z-index:5;flex-wrap:wrap}
#batch-bar.show{display:flex}
.bc{font-size:.78rem;color:var(--text2);flex:1;white-space:nowrap}
.bf{display:flex;align-items:center;gap:5px}
.bf label{font-size:.72rem;color:var(--text2);white-space:nowrap}
.bf input,.bf select{padding:4px 7px;border-radius:5px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:.78rem;outline:none;width:130px}
.bf input:focus{border-color:var(--primary)}

.pov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
.pov.show{display:flex}
.pbx{background:var(--surface);border-radius:14px;padding:28px;min-width:300px;text-align:center}
.pbg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:14px 0}
.pbf{height:100%;background:var(--primary);border-radius:3px;transition:width .3s;width:0}
.ptx{font-size:.82rem;color:var(--text2)}

#toast{position:fixed;top:16px;right:16px;padding:9px 18px;border-radius:9px;font-size:.78rem;font-weight:500;z-index:200;transform:translateX(120%);transition:transform .3s cubic-bezier(.16,1,.3,1);max-width:340px;word-break:break-word}
#toast.show{transform:translateX(0)}
#toast.ok{background:#166534;color:#bbf7d0;border:1px solid #15803d}
#toast.err{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
#toast.info{background:#1e3a5f;color:#93c5fd;border:1px solid #1e40af}

#login-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
#login-modal.hidden{display:none}
.lbx{background:var(--surface);border-radius:14px;padding:28px;width:360px;max-width:90vw}
.lbx h2{font-size:1.05rem;font-weight:700;margin-bottom:18px;text-align:center}
.lbx .fg{margin-bottom:12px}
.lbx .btn{width:100%;justify-content:center;padding:9px;margin-top:6px}
.le{font-size:.72rem;color:#ef4444;margin-top:3px;display:none}
</style>
</head>
<body>

<div id="sidebar">
    <div class="logo"><img src="icon.png" alt="EmbyX"><span>EmbyX 元数据管理</span></div>
    <div class="nav-list" id="lib-list">
        <div class="nav-section">媒体库</div>
        <div class="nav-item" style="opacity:.35;pointer-events:none"><i data-lucide="loader-2" class="w-4 h-4"></i><span class="nav-label">加载中...</span></div>
    </div>
    <div style="border-top:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:6px">
        <a href="./index.html" class="nav-item" style="text-decoration:none;padding:7px 10px;font-size:.78rem">
            <i data-lucide="home" class="w-4 h-4"></i><span class="nav-label">返回主页</span>
        </a>
        <div id="user-bar" style="display:flex;align-items:center;gap:8px;font-size:.78rem;padding:7px 10px;border-radius:8px">
            <div id="perm-dot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#6b7280"></div>
            <span class="nav-label" id="user-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)">未登录</span>
        </div>
        <div class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i data-lucide="panel-left-close" class="w-4 h-4"></i>
            <span class="sidebar-toggle-text">收起</span>
        </div>
    </div>
</div>

<div id="main">
    <div id="tree-panel">
        <div id="tree-header">
            <h3 id="tree-title">选择媒体库</h3>
            <div style="position:relative;flex:1;max-width:180px">
                <i data-lucide="search" class="w-3 h-3" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none"></i>
                <input type="text" id="tree-search" placeholder="搜索..." oninput="filterTree(this.value)">
            </div>
        </div>
        <div class="tree-box" id="tree-box">
            <div class="ep"><i data-lucide="folder-open" class="w-10 h-10"></i><span>从左侧选择媒体库</span></div>
        </div>
    </div>
    <div id="edit-panel">
        <div id="edit-header">
            <h3 id="edit-title">编辑</h3>
            <button class="btn btn-p" id="save-btn" style="display:none;font-size:.75rem;padding:5px 12px" onclick="saveSingle()"><i data-lucide="check" class="w-3.5 h-3.5"></i> 保存</button>
        </div>
        <div class="edit-body" id="edit-body">
            <div class="ep" id="edit-ph"><i data-lucide="file-edit" class="w-10 h-10"></i><span>选择项目编辑，或勾选多个批量操作</span></div>
            <div id="edit-form" style="display:none"></div>
        </div>
        <div id="batch-bar">
            <span class="bc" id="batch-cnt">已选 0 项</span>
            <div class="bf"><label>标签</label><input id="b-tag" placeholder="添加标签"></div>
            <div class="bf"><label>人物</label><input id="b-person" placeholder="添加人物名"></div>
            <button class="btn btn-p" style="font-size:.75rem;padding:5px 12px" onclick="runBatch()"><i data-lucide="play" class="w-3.5 h-3.5"></i> 执行</button>
            <button class="btn btn-s" style="font-size:.75rem;padding:5px 10px" onclick="clearSel()">取消</button>
        </div>
    </div>
</div>

<div class="pov" id="pov">
    <div class="pbx">
        <div style="font-weight:600;margin-bottom:3px" id="pv-title">批量更新中...</div>
        <div class="ptx" id="pv-text">0 / 0</div>
        <div class="pbg"><div class="pbf" id="pv-fill"></div></div>
        <button class="btn btn-s" style="font-size:.75rem" onclick="cancelBatch()">取消</button>
    </div>
</div>

<div id="toast"></div>

<div id="login-modal" class="hidden">
    <div class="lbx">
        <h2>未登录</h2>
        <p style="font-size:.82rem;color:var(--text2);text-align:center;margin:0 0 16px">请先在 EmbyX 首页登录</p>
        <a href="./index.html" class="btn btn-p" style="width:100%;justify-content:center;padding:9px;text-decoration:none">前往登录</a>
    </div>
</div>

<script>
const C={server:'',token:'',userId:'',deviceId:'',deviceName:'EmbyX-NFO',appVersion:'1.1',
    get base(){return this.server+'/emby'},
    get hdr(){return `Emby Client="EmbyX", Device="${this.deviceName}", DeviceId="${this.deviceId}", Version="${this.appVersion}"${this.token?`, Token="${this.token}"`:''}`}};
const S={views:[],curView:null,tree:new Map(),sel:new Set(),edit:null,changes:{},batching:false,ac:null};

window.addEventListener('DOMContentLoaded',()=>{lucide.createIcons();loadCfg();
    if(!C.server||!C.token)document.getElementById('login-modal').classList.remove('hidden');
    else initApp()});

function loadCfg(){
    C.server=localStorage.getItem('emby_server')||'';
    C.token=localStorage.getItem('emby_token')||'';
    C.userId=localStorage.getItem('emby_uid')||'';
    C.deviceId=localStorage.getItem('emby_device_id')||'EmbyX-NFO-'+Math.random().toString(36).slice(2,8);
    if(!localStorage.getItem('emby_device_id'))localStorage.setItem('emby_device_id',C.deviceId);
}

async function initApp(){
    document.getElementById('login-modal').classList.add('hidden');
    lucide.createIcons();
    const userName = localStorage.getItem('emby_user') || '已登录';
    document.getElementById('user-name').textContent = userName;
    await loadViews();
}

function doLogin(){window.location.href='./index.html'}

async function loadViews(){
    try{const r=await api(`/Users/${C.userId}/Views`);const d=await r.json();
        S.views=(d.Items||[]).filter(v=>!['playlists','boxsets','boxset'].includes(v.CollectionType));
        renderSidebar();
    }catch(e){toast('加载媒体库失败','err')}
}

function renderSidebar(){
    const el=document.getElementById('lib-list');
    const im={'tvseries':'tv','movies':'film','music':'music','homevideos':'camera','photos':'image','livetv':'radio','mixed':'layers'};
    el.innerHTML='<div class="nav-section">媒体库</div>';
    S.views.forEach(v=>{
        const d=document.createElement('div');d.className='nav-item';d.dataset.vid=v.Id;
        d.innerHTML=`<i data-lucide="${im[v.CollectionType]||'folder'}" class="w-4 h-4"></i><span class="nav-label">${esc(v.Name)}</span>`;
        d.onclick=()=>selectView(v);el.appendChild(d);
    });lucide.createIcons();
}

function selectView(v){
    S.curView=v;S.tree.clear();S.sel.clear();S.edit=null;S.changes={};
    document.querySelectorAll('#lib-list .nav-item').forEach(e=>e.classList.toggle('active',e.dataset.vid===v.Id));
    document.getElementById('tree-title').textContent=v.Name;
    document.getElementById('edit-title').textContent='编辑';
    document.getElementById('save-btn').style.display='none';
    document.getElementById('edit-form').style.display='none';
    document.getElementById('edit-ph').style.display='flex';
    document.getElementById('batch-bar').classList.remove('show');
    loadRoot(v.Id);
}

async function loadRoot(pid){
    const box=document.getElementById('tree-box');
    box.innerHTML='<div class="tl"><div class="sp"></div>加载中...</div>';
    try{const items=await fetchKids(pid);
        S.tree.set(pid,{item:{Id:pid,Name:S.curView.Name,IsFolder:true},kids:items,open:true,loaded:true});
        renderNodes(box,items,pid);
    }catch(e){box.innerHTML='<div class="ep"><span>加载失败</span></div>'}
}

async function fetchKids(pid){
    const r=await api(`/Users/${C.userId}/Items?ParentId=${pid}&Limit=500&Fields=IsFolder,ChildCount,IndexNumber,ProductionYear,Type&SortBy=SortName&SortOrder=Ascending`);
    const d=await r.json();return d.Items||[];
}

function renderNodes(box,items,pid,depth=0){
    if(depth===0)box.innerHTML='';
    if(!items||!items.length){if(depth===0)box.innerHTML='<div class="ep"><span>此库为空</span></div>';return}
    items.forEach(it=>{
        const hasKids=it.IsFolder||['Series','Season','BoxSet','Folder'].includes(it.Type);
        const nd=document.createElement('div');nd.className='tn';nd.dataset.id=it.Id;nd.dataset.nm=(it.Name||'').toLowerCase();

        const ck=document.createElement('div');ck.className='ck';
        ck.onclick=e=>{e.stopPropagation();toggleSel(it.Id,ck)};nd.appendChild(ck);

        const arr=document.createElement('div');arr.className='arr'+(hasKids?'':' hide');
        arr.innerHTML='<i data-lucide="chevron-right" style="width:13px;height:13px"></i>';nd.appendChild(arr);

        const ico=document.createElement('i');ico.setAttribute('data-lucide',nodeIcon(it));ico.className='ico';nd.appendChild(ico);

        const nm=document.createElement('span');nm.className='nm';nm.textContent=it.Name||'?';nd.appendChild(nm);

        if(hasKids&&it.ChildCount>0){const c=document.createElement('span');c.className='cnt';c.textContent=it.ChildCount;nd.appendChild(c)}

        nd.onclick=()=>{if(hasKids)toggleExp(nd,it,arr);else pickItem(it)};
        box.appendChild(nd);

        if(hasKids){const ch=document.createElement('div');ch.className='tc shut';ch.id='ch-'+it.Id;box.appendChild(ch)}
    });lucide.createIcons();updBar();
}

function nodeIcon(it){
    if(it.Type==='Series')return'tv';if(it.Type==='Season')return'list';if(it.Type==='Episode')return'film';
    if(it.Type==='Movie')return'clapperboard';if(it.IsFolder)return'folder';if(it.Type==='Video')return'video';return'file';
}

async function toggleExp(nd,it,arr){
    const ch=document.getElementById('ch-'+it.Id);if(!ch)return;
    if(!ch.classList.contains('shut')){ch.classList.add('shut');arr.classList.remove('open');return}
    const cached=S.tree.get(it.Id);
    if(cached&&cached.loaded){ch.classList.remove('shut');arr.classList.add('open');return}
    ch.innerHTML='<div class="tl"><div class="sp"></div></div>';ch.classList.remove('shut');arr.classList.add('open');
    try{const items=await fetchKids(it.Id);
        S.tree.set(it.Id,{item:it,kids:items,open:true,loaded:true});
        renderNodes(ch,items,it.Id,1);
    }catch(e){ch.innerHTML='<div class="tl" style="color:var(--text2)">加载失败</div>'}
}

function toggleSel(id,ck){
    if(S.sel.has(id)){S.sel.delete(id);ck.classList.remove('on')}
    else{S.sel.add(id);ck.classList.add('on')}
    updBar();
}

function clearSel(){
    S.sel.clear();
    document.querySelectorAll('.ck.on,.ck.part').forEach(c=>c.classList.remove('on','part'));
    updBar();
}

function updBar(){
    const bar=document.getElementById('batch-bar');
    if(S.sel.size>0){bar.classList.add('show');document.getElementById('batch-cnt').textContent=`已选 ${S.sel.size} 项`}
    else bar.classList.remove('show');
}

function pickItem(it){
    document.querySelectorAll('.tn.sel').forEach(e=>e.classList.remove('sel'));
    const nd=document.querySelector(`.tn[data-id="${it.Id}"]`);if(nd)nd.classList.add('sel');
    S.edit=it;S.changes={};
    document.getElementById('edit-title').textContent=it.Name||'编辑';
    document.getElementById('save-btn').style.display='inline-flex';
    document.getElementById('edit-ph').style.display='none';
    renderForm(it);
}

function renderForm(it){
    const f=document.getElementById('edit-form');f.style.display='block';
    let h='';
    if(it.Path)h+=`<div class="fg"><div class="fl">路径</div><div style="font-size:.72rem;color:var(--text2);padding:7px 10px;background:var(--hover);border-radius:5px;word-break:break-all;font-family:monospace;user-select:text;-webkit-user-select:text">${esc(it.Path)}</div></div>`;

    h+=`<div class="fg"><div class="fl">标题</div><input class="fi" data-f="Name" value="${esc(it.Name||'')}" oninput="onChg('Name',this.value)"></div>`;

    h+=`<div class="fg"><div class="fl">概要</div><textarea class="fi" data-f="Overview" oninput="onChg('Overview',this.value)">${esc(it.Overview||'')}</textarea></div>`;

    const tags=Array.isArray(it.Tags)?it.Tags:[];
    h+=`<div class="fg"><div class="fl">标签</div><input class="fi" data-f="Tags" value="${esc(tags.join(', '))}" oninput="onChg('Tags',this.value)" placeholder="逗号分隔"><div class="fh">多个标签用逗号分隔</div></div>`;

    const people=Array.isArray(it.People)?it.People:[];
    const pnames=people.map(p=>p.Name).join(', ');
    h+=`<div class="fg"><div class="fl">人物</div><input class="fi" data-f="People" value="${esc(pnames)}" oninput="onChg('People',this.value)" placeholder="逗号分隔"><div class="fh">多人用逗号分隔，格式: 张三, 李四</div></div>`;

    h+=`<div class="fg"><div class="fl">信息</div><div style="font-size:.78rem;color:var(--text2);line-height:1.7">
        <div>ID: ${it.Id}</div><div>类型: ${it.Type||'-'}</div>
        ${it.DateCreated?`<div>加入: ${new Date(it.DateCreated).toLocaleString('zh-CN')}</div>`:''}
        ${it.ProductionYear?`<div>年份: ${it.ProductionYear}</div>`:''}
    </div></div>`;

    f.innerHTML=h;
}

function onChg(k,v){S.changes[k]=v}

async function saveSingle(){
    if(!S.edit||!Object.keys(S.changes).length)return;
    const btn=document.getElementById('save-btn');btn.disabled=true;
    btn.innerHTML='<i data-lucide="loader-2" class="w-3.5 h-3.5" style="animation:spin .8s linear infinite"></i> 保存中...';lucide.createIcons();
    try{
        const payload=buildPayload(S.changes);
        await updateItem(S.edit.Id,payload);
        Object.assign(S.edit,S.changes);S.changes={};
        if(payload.Name){const nd=document.querySelector(`.tn[data-id="${S.edit.Id}"] .nm`);if(nd)nd.textContent=payload.Name}
        toast('保存成功','ok');document.getElementById('perm-dot').style.background='#52B54B';
    }catch(e){toast('保存失败: '+(e.message||''),'err');console.error('[NFO] save error:',e);
        if(e.message&&e.message.includes('403')){document.getElementById('perm-dot').style.background='#ef4444';toast('权限不足，请使用管理员账号','err')}
    finally{btn.disabled=false;btn.innerHTML='<i data-lucide="check" class="w-3.5 h-3.5"></i> 保存';lucide.createIcons()}
}

function buildPayload(ch){
    const p={};
    if(ch.Name!==undefined)p.Name=ch.Name;
    if(ch.Overview!==undefined)p.Overview=ch.Overview;
    if(ch.Tags!==undefined)p.Tags=parseList(ch.Tags);
    if(ch.People!==undefined)p.People=ch.People.split(',').map(s=>s.trim()).filter(Boolean).map(n=>({Name:n,Type:'Unknown'}));
    return p;
}

function parseList(s){return s.split(',').map(x=>x.trim()).filter(Boolean)}

async function runBatch(){
    if(!S.sel.size||S.batching)return;
    const tagVal=document.getElementById('b-tag').value.trim();
    const personVal=document.getElementById('b-person').value.trim();
    if(!tagVal&&!personVal){toast('请至少填写标签或人物','err');return}

    const ids=[...S.sel];
    const items=ids.map(id=>findNode(id)).filter(Boolean);
    if(!items.length){toast('未找到选中项目','err');return}

    S.batching=true;S.ac=new AbortController();
    const ov=document.getElementById('pov');ov.classList.add('show');
    let done=0,fail=0;const total=items.length;

    for(const it of items){
        if(!S.batching)break;
        const payload={};
        if(tagVal){
            const cur=Array.isArray(it.Tags)?it.Tags:[];
            if(!cur.includes(tagVal))payload.Tags=[...cur,tagVal];
        }
        if(personVal){
            const cur=Array.isArray(it.People)?it.People:[];
            const names=cur.map(p=>p.Name);
            if(!names.includes(personVal))payload.People=[...cur,{Name:personVal,Type:'Unknown'}];
        }
        if(Object.keys(payload).length){
            try{await updateItem(it.Id,payload);done++;
                if(payload.Tags){const nd=document.querySelector(`.tn[data-id="${it.Id}"]`);if(nd){/* tag icon glow */}}
            }catch(e){fail++;console.error('[NFO] batch item',it.Id,'error:',e.message)}
        }else done++;

        document.getElementById('pv-text').textContent=`${done+fail} / ${total}${fail?` (${fail} 失败)`:''}`;
        document.getElementById('pv-fill').style.width=`${((done+fail)/total)*100}%`;
        await sleep(250);
    }
    S.batching=false;ov.classList.remove('show');
    toast(fail?`完成 ${done} 项，${fail} 失败`:`成功更新 ${done} 项`,fail?'err':'ok');
    clearSel();
}

function cancelBatch(){S.batching=false;if(S.ac)S.ac.abort();document.getElementById('pov').classList.remove('show');toast('已取消','info')}

function findNode(id){for(const[,n]of S.tree){const f=n.kids.find(c=>String(c.Id)===String(id));if(f)return f}return null}

async function api(path,opt={}){
    const url=`${C.base}${path}${path.includes('?')?'&':'?'}api_key=${C.token}`;
    const r=await fetch(url,{...opt,headers:{'X-Emby-Authorization':C.hdr,...opt.headers},signal:S.ac?.signal});
    if(!r.ok)throw new Error(`API ${r.status}`);return r;
}

async function updateItem(id,payload){
    const r=await api(`/Items/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});return r;
}

function filterTree(q){
    const ql=q.toLowerCase().trim();
    document.querySelectorAll('.tn').forEach(n=>{
        if(!ql){n.style.display='';return}
        const m=(n.dataset.nm||'').includes(ql);n.style.display=m?'':'none';
        if(m){let p=n.parentElement;while(p&&p.classList.contains('tc')){p.classList.remove('shut');p.style.display='';const pn=p.previousElementSibling;if(pn&&pn.classList.contains('tn')){pn.style.display='';const a=pn.querySelector('.arr');if(a)a.classList.add('open')}p=p.parentElement}}
    });
}

function toast(msg,type='info'){const e=document.getElementById('toast');e.textContent=msg;e.className=type+' show';clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
